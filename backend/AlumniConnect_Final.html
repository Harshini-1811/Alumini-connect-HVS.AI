<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AlumniConnect + HVS.Ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"],:root{--bg:#0d0f1a;--bg2:#111320;--bg3:#1a1d2e;--card:#151829;--cb:rgba(255,255,255,.08);--t:#f1f5f9;--t2:#94a3b8;--t3:#475569;--ac:#6366f1;--ac2:#8b5cf6;--green:#10b981;--gold:#f59e0b;--red:#ef4444}
[data-theme="light"]{--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--card:#fff;--cb:rgba(0,0,0,.09);--t:#0f172a;--t2:#475569;--t3:#94a3b8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);line-height:1.5;min-height:100vh}body.app-mode{height:100vh;overflow:hidden}body.app-mode{height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}
input,textarea,select{width:100%;padding:10px 13px;background:var(--bg3);border:1px solid var(--cb);border-radius:10px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;display:block;transition:border .2s;margin-bottom:0}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}textarea{resize:vertical}select{appearance:none;cursor:pointer}
.lbl{display:block;font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;margin-top:12px}.lbl:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;cursor:pointer;border:none;transition:all .18s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}.btn-p:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.4)}
.btn-s{background:var(--bg3);border:1px solid var(--cb);color:var(--t2)}.btn-s:hover:not(:disabled){color:var(--t);background:var(--card)}
.btn-g{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.btn-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.22);color:#f87171}
.btn-sm{font-size:12px;padding:6px 12px}
.card{background:var(--card);border:1px solid var(--cb);border-radius:14px;padding:18px}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.t-p{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);color:#818cf8}
.t-g{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);color:#34d399}
.t-gold{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.t-r{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);color:#f87171}
.t-c{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.2);color:#22d3ee}
.spinner{width:26px;height:26px;border:3px solid var(--cb);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .22s ease}
.app{display:flex;height:100vh}
.sidebar{background:var(--bg2);border-right:1px solid var(--cb);display:flex;flex-direction:column;overflow:hidden;transition:width .22s;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:11px;padding:11px 22px;background:var(--bg2);border-bottom:1px solid var(--cb);flex-shrink:0}
.pg{flex:1;padding:22px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 11px;margin:1px 5px;border-radius:9px;cursor:pointer;font-size:13px;width:calc(100% - 10px);text-align:left;font-family:'DM Sans';transition:all .15s;white-space:nowrap;overflow:hidden;border:1px solid transparent;background:transparent;color:var(--t2)}
.ni.act{border-color:rgba(99,102,241,.25);background:rgba(99,102,241,.12);color:var(--ac)}
.ni:hover:not(.act){background:rgba(255,255,255,.04);color:var(--t)}
.ns{padding:9px 10px 2px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.9px}
.msg-me{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:14px 14px 3px 14px;align-self:flex-end}
.msg-them{background:var(--bg3);color:var(--t);border:1px solid var(--cb);border-radius:14px 14px 14px 3px;align-self:flex-start}
.hvs-sb{background:linear-gradient(180deg,#0a0d24,#150b2e);border-right:1px solid rgba(139,92,246,.18);display:flex;flex-direction:column;width:210px;min-width:210px;flex-shrink:0}
.hni{display:flex;align-items:center;gap:9px;padding:9px 13px;margin:2px 7px;border-radius:9px;cursor:pointer;font-size:13px;transition:all .15s;width:calc(100% - 14px);text-align:left;font-family:'DM Sans';border:1px solid transparent;background:transparent;color:#a78bfa}
.hni.act{border-color:rgba(139,92,246,.28);background:rgba(139,92,246,.18);color:#c4b5fd}
.hni:hover:not(.act){background:rgba(139,92,246,.08)}
</style>
</head>
<body>
<div id="root"></div>
<script>
'use strict';
// ─── DB (localStorage persistence) ───────────────────────────────────────────
const DB_KEY='ac_v9';
function dbLoad(){
  const e={users:{},connections:[],requests:[],jobs:[],events:[],forum:[],skills:{},chats:{}};
  try{const r=localStorage.getItem(DB_KEY);if(!r)return e;const d=JSON.parse(r);for(const k in e)if(!(k in d))d[k]=e[k];return d;}catch{return e;}
}
function dbSave(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}}
const DB=dbLoad();

// ─── Helpers ──────────────────────────────────────────────────────────────────
function rid(){return Math.random().toString(36).slice(2,10);}
function hpw(p){let h=5381;for(let i=0;i<p.length;i++)h=((h<<5)+h)+p.charCodeAt(i);return(h>>>0).toString(16);}
function norm(c){return(c||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');}
function validEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((e||'').trim());}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function $(i){return document.getElementById(i);}
function gv(i){const e=$(i);return e?e.value:'';}
function sv(i,v){const e=$(i);if(e)e.value=v;}
function fmtD(){return new Date().toLocaleDateString('en-GB');}
function toast(msg,ok=true){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;bottom:22px;right:22px;z-index:9999;background:${ok?'rgba(16,185,129,.95)':'rgba(239,68,68,.95)'};color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 7px 26px rgba(0,0,0,.28);font-family:'DM Sans',sans-serif;max-width:340px;white-space:pre-line;z-index:99999`;
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}
function av(name,sz=36){
  const i=(name||'?').trim().split(' ').map(w=>w[0]?.toUpperCase()||'').join('').slice(0,2)||'?';
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:${sz*.36}px;color:#fff;font-family:'Syne'">${i}</div>`;
}
function dlFile(content,mime,fname){
  try{
    const blob=new Blob([content],{type:mime});
    const fr=new FileReader();
    fr.onload=e=>{const a=document.createElement('a');a.href=e.target.result;a.download=fname;a.style.display='none';document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),500);};
    fr.readAsDataURL(blob);
  }catch(err){toast('Download error: '+err.message,false);}
}

// ─── API Layer ────────────────────────────────────────────────────────────────
const API={
  signup(d){
    const name=(d.name||'').trim(),email=(d.email||'').trim().toLowerCase(),college=(d.college||'').trim(),pw=d.password||'';
    if(!name)throw new Error('Please enter your full name.');
    if(!email)throw new Error('Please enter your email address.');
    if(!validEmail(email))throw new Error('Please enter a valid email (e.g. name@gmail.com).');
    if(!college)throw new Error('Please enter your college / university name.');
    if(pw.length<6)throw new Error('Password must be at least 6 characters.');
    if(!['student','alumni'].includes(d.role))throw new Error('Invalid role.');
    if(DB.users[email])throw new Error(`An account already exists for '${email}'. Please sign in instead.`);
    const u={uid:email,email,name,role:d.role,college,pts:0,bio:'',skills:[],createdAt:Date.now(),_pw:hpw(pw),degree:d.degree||'',gradYear:d.gradYear||'',major:d.major||'',currentCompany:d.currentCompany||'',currentRole:d.currentRole||'',experience:d.experience||'',linkedin:'',github:'',interests:d.major||''};
    DB.users[email]=u;dbSave();return{...u,_pw:undefined};
  },
  login(d){
    const email=(d.email||'').trim().toLowerCase(),pw=d.password||'';
    if(!email)throw new Error('Please enter your email address.');
    if(!validEmail(email))throw new Error('Please enter a valid email (e.g. name@gmail.com).');
    if(!pw)throw new Error('Please enter your password.');
    const u=DB.users[email];
    if(!u)throw new Error(`No account found for '${email}'. Please sign up first.`);
    if(u._pw!==hpw(pw))throw new Error('Incorrect password. Please try again.');
    return{...u,_pw:undefined};
  },
  updateProfile(uid,d){const u=DB.users[uid];if(!u)throw new Error('User not found.');Object.assign(u,d);dbSave();return{...u,_pw:undefined};},
  getSkills(uid){return DB.skills[uid]||[];},
  addSkill(uid,name){const n=(name||'').trim();if(!n)throw new Error('Skill cannot be empty.');const s=DB.skills[uid]||[];if(s.some(x=>x.n.toLowerCase()===n.toLowerCase()))throw new Error(`'${n}' already added.`);s.push({n,e:0});DB.skills[uid]=s;const u=DB.users[uid];if(u)u.skills=s.map(x=>x.n);dbSave();return s;},
  delSkill(uid,i){const s=DB.skills[uid]||[];if(i>=0&&i<s.length)s.splice(i,1);DB.skills[uid]=s;const u=DB.users[uid];if(u)u.skills=s.map(x=>x.n);dbSave();return s;},
  matchScore(st,al){
    const sc=norm(st.college||''),ac=norm(al.college||'');let score=0;
    if(sc&&ac){if(sc===ac)score+=60;else if(sc.length>4&&sc.slice(0,5)===ac.slice(0,5))score+=30;}
    const interests=((st.interests||st.major||'').toLowerCase()).split(/\s+/);
    const kw=[al.currentRole||'',al.bio||'',...(al.skills||[])].join(' ').toLowerCase();
    score+=Math.min(40,interests.filter(w=>w.length>2&&kw.includes(w)).length*8);
    return Math.min(100,score);
  },
  getMentors(uid,q){
    const st=DB.users[uid];if(!st)return[];const sc=norm(st.college||'');if(!sc)return[];
    return Object.values(DB.users).filter(u=>u.role==='alumni'&&u.uid!==uid&&norm(u.college||'')===sc).filter(u=>!q||[u.name,u.currentRole,u.currentCompany,...(u.skills||[])].join(' ').toLowerCase().includes(q.toLowerCase())).map(u=>({...u,_pw:undefined,ms:API.matchScore(st,u)})).sort((a,b)=>b.ms-a.ms);
  },
  sendReq(from,to){
    const fu=DB.users[from],tu=DB.users[to];
    if(!fu||!tu)throw new Error('User not found.');
    if(norm(fu.college)!==norm(tu.college))throw new Error('You can only connect with alumni from your own college.');
    if(DB.requests.some(r=>r.from===from&&r.to===to&&r.status==='pending'))throw new Error('Request already sent.');
    if(DB.connections.some(c=>(c.a===from&&c.b===to)||(c.a===to&&c.b===from)))throw new Error('Already connected.');
    const req={id:rid(),from,to,status:'pending',date:fmtD()};DB.requests.push(req);dbSave();return req;
  },
  acceptReq(reqId,uid){const req=DB.requests.find(r=>r.id===reqId);if(!req)throw new Error('Not found.');req.status='accepted';if(!DB.connections.some(c=>(c.a===req.from&&c.b===uid)||(c.a===uid&&c.b===req.from)))DB.connections.push({a:req.from,b:uid});dbSave();return req;},
  declineReq(reqId,uid){const req=DB.requests.find(r=>r.id===reqId&&r.to===uid);if(req){req.status='declined';dbSave();}},
  cancelReq(reqId,uid){const i=DB.requests.findIndex(r=>r.id===reqId&&r.from===uid);if(i>-1){DB.requests.splice(i,1);dbSave();}},
  getConns(uid){const u=DB.users[uid];if(!u)return[];const uc=norm(u.college||'');return DB.connections.map(c=>c.a===uid?DB.users[c.b]:c.b===uid?DB.users[c.a]:null).filter(u=>u&&norm(u.college||'')===uc).map(u=>({...u,_pw:undefined}));},
  getInbox(uid){const u=DB.users[uid];if(!u)return[];const uc=norm(u.college||'');return DB.requests.filter(r=>r.to===uid).map(r=>{const s=DB.users[r.from];if(!s||norm(s.college||'')!==uc)return null;return{...r,fromUser:{...s,_pw:undefined}};}).filter(Boolean);},
  getSent(uid){return DB.requests.filter(r=>r.from===uid).map(r=>({...r,toUser:{...(DB.users[r.to]||{}),_pw:undefined}}));},
  getMsgs(a,b){const k1=`${a}_${b}`,k2=`${b}_${a}`;return DB.chats[k1]||DB.chats[k2]||[];},
  sendMsg(from,to,text){const fu=DB.users[from],tu=DB.users[to];if(!fu||!tu)throw new Error('User not found.');if(norm(fu.college)!==norm(tu.college))throw new Error('Same-college only.');const t=(text||'').trim();if(!t)throw new Error('Empty message.');const k1=`${from}_${to}`,k2=`${to}_${from}`;const key=DB.chats[k2]?k2:k1;if(!DB.chats[key])DB.chats[key]=[];const msg={from,text:t,ts:Date.now()};DB.chats[key].push(msg);dbSave();return msg;},
  postJob(uid,d){if(!(d.title||'').trim())throw new Error('Job title required.');if(!(d.company||'').trim())throw new Error('Company required.');const j={...d,id:rid(),by:uid,date:fmtD()};DB.jobs.push(j);dbSave();return j;},
  getJobs(q,type){return DB.jobs.filter(j=>{if(q&&![j.title,j.company].join(' ').toLowerCase().includes(q.toLowerCase()))return false;if(type&&type!=='All'&&j.jobType!==type)return false;return true;}).map(j=>({...j,byName:DB.users[j.by]?.name||'Unknown'}));},
  createEvent(uid,d){if(!(d.title||'').trim())throw new Error('Event title required.');const e={...d,id:rid(),by:uid,date:fmtD()};DB.events.push(e);dbSave();return e;},
  getEvents(){return DB.events.map(e=>({...e,byName:DB.users[e.by]?.name||'Unknown'}));},
  createPost(uid,d){if(!(d.title||'').trim())throw new Error('Post title required.');if(!(d.content||'').trim())throw new Error('Content required.');const u=DB.users[uid];const p={...d,id:rid(),by:uid,byName:u?.name||'?',likes:0,replies:0,date:fmtD()};DB.forum.unshift(p);dbSave();return p;},
  likePost(id){const p=DB.forum.find(x=>x.id===id);if(p){p.likes++;dbSave();}},
  submitQuiz(uid,answers){const u=DB.users[uid];if(!u)throw new Error('User not found.');const ANS=[0,2,1,2,3,1,1,2,1,1];const correct=answers.filter((a,i)=>i<ANS.length&&a===ANS[i]).length;const score=Math.round(correct/ANS.length*100);const earn=score>75?30:score===75?20:score>=50?10:0;u.pts=(u.pts||0)+earn;dbSave();return{score,correct,total:ANS.length,earned:earn,pts:u.pts};},
  getDash(uid){const u=DB.users[uid];if(!u)throw new Error('User not found.');const sc=norm(u.college||'');const conns=API.getConns(uid);const recs=sc?Object.values(DB.users).filter(a=>a.role==='alumni'&&a.uid!==uid&&norm(a.college||'')===sc).map(a=>({...a,_pw:undefined,ms:API.matchScore(u,a)})).sort((a,b)=>b.ms-a.ms).slice(0,4):[];return{conns:conns.length,pending:DB.requests.filter(r=>r.from===uid&&r.status==='pending').length,skills:(DB.skills[uid]||[]).length,topM:recs[0]?.ms||0,recs,events:DB.events.slice(-3)};}
};

// ─── AI Call ──────────────────────────────────────────────────────────────────
const ANTHROPIC_KEY=''; // paste key or set window.ANTHROPIC_KEY in console
async function aiCall(messages,system,max=2000){
  const key=ANTHROPIC_KEY||window.ANTHROPIC_KEY||'';
  if(!key)return null;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,system,messages})});
    const d=await r.json();return d.content?.[0]?.text||null;
  }catch{return null;}
}

// ─── App State ────────────────────────────────────────────────────────────────
let CU=null,CP='dash',CM='main',CTheme='dark',CCol=false;
let ChatW=null,HS='chat',BotMsgs=[],HvsMsgs=[{r:'ai',t:"Hi! I'm HVS.Ai — your AI assistant. Ask me anything or use the tools on the left! 🚀"}];
let QSt={on:false,done:false,step:0,ans:{},time:300,timer:null,res:null};
let RSt=0,RD={};
let PSlides=[],PStyle='Professional',PTopic='',PCount=8;
let DocTxt='';
let WbHtml='',WbState='idle',WbPrompt='',WbType='Landing Page',WbEdit='';
let PdfFiles=[],PdfTool='merge';
let CamStr=null,Rec=false,RecSec=0,RecTimer=null,VidRes=null,VidLoading=false;
let IvwD=null,IvwStr=null,IvwSpk=false,SR=null,SRon=false;

// Cleanup registry
const CLN={};
function regClean(k,fn){CLN[k]=fn;}
function runAllClean(){Object.keys(CLN).forEach(k=>{try{CLN[k]();}catch(e){}delete CLN[k];});}

// ─── Render ───────────────────────────────────────────────────────────────────
const ROOT=document.getElementById('root');
function render(){
  document.documentElement.setAttribute('data-theme',CTheme);
  if(!CU){document.body.classList.remove('app-mode');renderAuth();return;}
  document.body.classList.add('app-mode');
  if(CM==='hvs'){renderHVS();return;}renderApp();
}
function goPage(p){runAllClean();CP=p;ChatW=null;if(QSt.timer){clearInterval(QSt.timer);QSt.timer=null;}render();}
function goHVS(){runAllClean();HS='chat';CM='hvs';render();}
function setPage(h){const el=$('pg');if(el){el.innerHTML=h;el.className='pg fade-in';}}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function renderAuth(){
  ROOT.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);padding:30px 20px 60px;">
    <div style="width:100%;max-width:460px;margin:auto;">
      <div style="text-align:center;margin-bottom:24px">
        <div style="width:54px;height:54px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-family:'Syne';font-weight:800;font-size:22px;color:#fff;margin-bottom:11px">A</div>
        <div style="font-family:'Syne';font-weight:800;font-size:22px">AlumniConnect + HVS.Ai</div>
        <div style="color:var(--t2);font-size:13px;margin-top:4px">Connect with alumni from your college</div>
      </div>
      <div class="card">
        <div style="display:flex;gap:4px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:20px">
          <button id="tb-l" onclick="swTab('l')" style="flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans';background:var(--ac);color:#fff;transition:all .15s">Sign In</button>
          <button id="tb-s" onclick="swTab('s')" style="flex:1;padding:9px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans';background:transparent;color:var(--t2);transition:all .15s">Sign Up</button>
        </div>
        <div id="aerr" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:11px 14px;font-size:13px;color:#f87171;margin-bottom:14px;line-height:1.5;white-space:pre-line"></div>
        <div id="aok" style="display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:9px;padding:11px 14px;font-size:13px;color:#34d399;margin-bottom:14px"></div>
        <div id="fl">
          <label class="lbl">Email Address</label><input id="le" type="email" placeholder="name@gmail.com" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="email">
          <label class="lbl">Password</label><input id="lp" type="password" placeholder="your password" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
          <button class="btn btn-p" style="width:100%;margin-top:18px;padding:11px" onclick="doLogin()">Sign In →</button>
          <p style="text-align:center;font-size:12px;color:var(--t3);margin-top:13px">No account? <strong style="color:var(--ac);cursor:pointer" onclick="swTab('s')">Create one free →</strong></p>
        </div>
        <div id="fs" style="display:none">

window.pwHint=el=>{const ph=$('pwhint');if(!ph)return;if(!el.value){ph.textContent='';return;}if(el.value.length<6){ph.innerHTML=`<span style="color:var(--red)">Too short (${el.value.length}/6 chars)</span>`;}else{ph.innerHTML='<span style="color:var(--green)">✓ Password looks good</span>';}};
function aerr(m){const e=$('aerr');if(e){e.textContent=m;e.style.display='block';}}
function aok(m){const e=$('aok');if(e){e.textContent=m;e.style.display='block';}}

window.doLogin=()=>{
  $('aerr').style.display='none';
  const email=gv('le').trim(),pw=gv('lp');
  if(!email)return aerr('Please enter your email address.');
  if(!validEmail(email))return aerr('Please enter a valid email (e.g. name@gmail.com).');
  if(!pw)return aerr('Please enter your password.');
  try{CU=API.login({email,password:pw});render();}catch(e){aerr(e.message);}
};

window.doSignup=()=>{
  $('aerr').style.display='none';$('aok').style.display='none';
  const name=gv('sn').trim(),email=gv('se').trim(),college=gv('sc2').trim(),pw=gv('sp');
  const isA=gv('sr').includes('alumni');
  if(!name)return aerr('Please enter your full name.');
  if(!email)return aerr('Please enter your email address.');
  if(!validEmail(email))return aerr('Please enter a valid email (e.g. name@gmail.com).');
  if(!college)return aerr('Please enter your college / university name.');
  if(!pw||pw.length<6)return aerr('Password must be at least 6 characters.');
  try{
    CU=API.signup({name,email,password:pw,role:isA?'alumni':'student',college,degree:gv('sdeg'),gradYear:gv('sgy'),major:gv('smaj'),currentCompany:gv('sco'),currentRole:gv('scr'),experience:gv('sexp')});
    aok(`Welcome, ${CU.name}! 🎉 Account created — redirecting…`);
    setTimeout(()=>render(),900);
  }catch(e){aerr(e.message);}
};

    <div style="font-size:12px;color:#c4b5fd;font-weight:600">AI Interviewer — Q ${IvwD.qi+1}/${qs.length}</div>
    <div style="position:absolute;bottom:10px;right:10px;width:110px;height:78px;border-radius:9px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.3)" id="cambx"><span style="font-size:18px">📷</span>${IvwD.hasCam?'Loading...':'No Camera'}</div>
  </div>
  <div style="background:var(--bg3);border:1px solid var(--cb);border-radius:12px;padding:14px 16px;margin-bottom:10px">
    <div style="font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:7px">AI ASKS:</div>
    <div style="font-size:14px;line-height:1.6;font-weight:500">${esc(q)}</div>
  </div>
  <div style="background:var(--bg3);border:1px solid var(--cb);border-radius:12px;padding:13px">
    <div style="font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:9px;text-align:center">YOUR ANSWER — SPEAK OR TYPE</div>
    <div style="display:flex;gap:9px;align-items:flex-end">

      </div>

  </div>
  <div style="display:flex;gap:9px;justify-content:center;padding-top:11px">

window.ivwMic=()=>{
  const SRC=window.SpeechRecognition||window.webkitSpeechRecognition;
  const btn=$('ivwm'),st=$('ivwst');
  if(!SRC){if(st)st.textContent='Voice recognition requires Chrome or Edge. Please type your answer.';return;}
  if(SRon){if(SR)try{SR.stop();}catch(e){}SRon=false;if(btn){btn.style.background='linear-gradient(135deg,#4f46e5,#7c3aed)';btn.style.boxShadow='';btn.textContent='🎤';}if(st)st.textContent='Stopped. Click ↗ to submit.';return;}
  SR=new SRC();SR.continuous=true;SR.interimResults=true;SR.lang='en-US';
  SR.onstart=()=>{SRon=true;if(btn){btn.style.background='linear-gradient(135deg,#dc2626,#b91c1c)';btn.style.boxShadow='0 0 0 5px rgba(239,68,68,.22)';btn.textContent='⏹';}if(st)st.innerHTML='<span style="color:#4ade80;font-weight:600">● Recording…</span>';};
  SR.onresult=e=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript+(e.results[i].isFinal?' ':'');const a=$('ivwa');if(a)a.value=t;};
  SR.onerror=e=>{SRon=false;if(btn){btn.style.background='linear-gradient(135deg,#4f46e5,#7c3aed)';btn.style.boxShadow='';btn.textContent='🎤';}if(st)st.textContent=e.error==='not-allowed'?'Mic denied. Click 🔒 in address bar → allow microphone.':e.error==='no-speech'?'No speech detected.':'Mic error: '+e.error;};
  SR.onend=()=>{SRon=false;if(btn){btn.style.background='linear-gradient(135deg,#4f46e5,#7c3aed)';btn.style.boxShadow='';btn.textContent='🎤';}const s=$('ivwst');if(s&&s.textContent.includes('Recording'))s.textContent='Done! Click ↗ to submit.';};
  try{SR.start();}catch(e){if(st)st.textContent='Cannot start: '+e.message;}
};
window.ivwSub=()=>{if(SRon&&SR){try{SR.stop();}catch(e){}SRon=false;}const a=gv('ivwa')||'';IvwD.answers.push(a);IvwD.scores.push(scoreAns(a));const qs=IVW[IvwD.role];if(IvwD.qi+1>=qs.length){endIvw();return;}IvwD.qi++;rIvwCall();};
window.endIvw=()=>{window.speechSynthesis?.cancel();if(IvwStr){IvwStr.getTracks().forEach(t=>t.stop());IvwStr=null;}if(SRon&&SR){try{SR.stop();}catch(e){}SRon=false;}IvwD.phase='done';rIvwDone();};
function rIvwDone(){
  const qs=IVW[IvwD.role];const total=IvwD.scores.length?Math.round(IvwD.scores.reduce((a,b)=>a+b,0)/qs.length):0;
  setPage(`<div><h2 style="font-family:'Syne';margin-bottom:14px">🎙️ Interview Results</h2><div class="card">
  <div style="text-align:center;padding:18px 0 22px"><div style="font-size:48px;margin-bottom:11px">${total>=80?'🏆':total>=60?'🎯':'💪'}</div><div style="font-family:'Syne';font-size:26px;font-weight:800">Score: ${total}/100</div><span style="display:inline-block;margin-top:8px;padding:6px 16px;border-radius:20px;font-size:13px;background:${total>=80?'rgba(16,185,129,.14)':total>=60?'rgba(245,158,11,.14)':'rgba(239,68,68,.14)'};color:${total>=80?'#34d399':total>=60?'#fbbf24':'#f87171'}">${total>=80?'Excellent':total>=60?'Good':'Needs Practice'}</span></div>
  ${qs.map((q,i)=>`<div style="padding:11px 0;border-bottom:1px solid var(--cb)"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div style="font-size:12px;font-weight:500;flex:1;padding-right:11px">${esc(q)}</div><span style="padding:2px 8px;border-radius:20px;font-size:11px;background:${(IvwD.scores[i]||0)>=70?'rgba(16,185,129,.14)':'rgba(245,158,11,.14)'};color:${(IvwD.scores[i]||0)>=70?'#34d399':'#fbbf24'};white-space:nowrap">${IvwD.scores[i]||0}/100</span></div><div style="font-size:11px;color:var(--t3)">${(IvwD.scores[i]||0)>=80?'✅ Excellent STAR structure!':(IvwD.scores[i]||0)>=60?'📝 Add specific metrics.':'⚠️ Use STAR: Situation → Task → Action → Result.'}</div></div>`).join('')}
  <button class="btn btn-p" style="width:100%;margin-top:16px" onclick="IvwD=null;pIvw()">Start New Interview</button>
  </div></div>`);
}

  const btn=$('pdfb'),prog=$('pdfp');if(btn)btn.disabled=true;if(prog)prog.textContent='Processing…';
  try{

      const frames=urls.map((url,i)=>`<div style="margin-bottom:28px"><div style="background:#6366f1;color:#fff;padding:10px 18px;font-size:13px;font-weight:600;border-radius:8px 8px 0 0">📄 ${i+1}. ${esc(PdfFiles[i].name)}</div><iframe src="${url}" width="100%" height="860" style="border:none;display:block;border-radius:0 0 8px 8px"></iframe></div>`).join('');
      dlFile(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Merged PDFs</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111827;padding:24px;font-family:sans-serif}.h{color:#fff;font-size:22px;font-weight:700;text-align:center;padding-bottom:8px}.pb{display:block;margin:0 auto 22px;padding:12px 30px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600}@media print{.pb,.h{display:none}}</style></head><body><div class="h">Merged PDFs — ${PdfFiles.length} files</div><button class="pb" onclick="window.print()">🖨️ Print All / Save as PDF</button>${frames}</body></html>`,'text/html','merged_pdfs.html');
      if(prog)prog.textContent='✅ Downloaded! Open merged_pdfs.html to view.';toast('PDFs merged! 📄');
    }else{
      for(let i=0;i<PdfFiles.length;i++){await new Promise(res=>{const r=new FileReader();r.onload=e=>{const a=document.createElement('a');a.href=e.target.result;a.download=PdfFiles[i].name.replace('.pdf','')+'_'+(i+1)+'.pdf';a.style.display='none';document.body.appendChild(a);a.click();setTimeout(()=>{a.remove();res();},400);};r.readAsDataURL(PdfFiles[i]);});}
      if(prog)prog.textContent=`✅ ${PdfFiles.length} file(s) downloaded!`;toast('Files downloaded! 📄');
    }
    PdfFiles=[];setTimeout(()=>{if(btn)btn.disabled=false;hvsPdf();},2200);
  }catch(e){toast('Error: '+e.message,false);if(btn)btn.disabled=false;if(prog)prog.textContent='';}
};

// ─── HVS WEBSITE BUILDER (like base44) ───────────────────────────────────────
function extractBizName(p){
  // P1: called Name (stop at period or lowercase word)
  var m=p.match(/\bcalled\s+["']?([A-Z][A-Za-z0-9&'-]+(?:\s+[A-Z][A-Za-z0-9&'-]+){0,2})["']?/i);
  if(m)return m[1].trim();
  // P2: named Name
  m=p.match(/\bnamed\s+["']?([A-Z][A-Za-z0-9&'-]+(?:\s+[A-Z][A-Za-z0-9&'-]+){0,2})["']?/i);
  if(m)return m[1].trim();
  // P3: "Name" double quotes
  m=p.match(/"([A-Z][^"]{1,30})"/);
  if(m)return m[1].trim();
  // P4: 'Name' single quotes
  m=p.match(/'([A-Z][A-Za-z0-9\s&]{1,28})'/);
  if(m)return m[1].trim();
  // P5: for [a/the] Name [biz-keyword]
  m=p.match(/\bfor\s+(?:a\s+|an\s+|the\s+)?([A-Z][A-Za-z0-9&'-]+(?:\s+[A-Z][A-Za-z0-9&'-]+){0,3})\s+(?:website|landing|page|startup|studio|shop|store|gym|cafe|restaurant|school|business|company|agency|firm|salon|spa|clinic|tech|app|platform|blog|portfolio)/i);
  if(m)return m[1].trim();
  // P6: [biz-verb] Name [page/site]
  m=p.match(/(?:build|create|make|design|develop)\s+([A-Z][A-Za-z0-9&'-]+(?:\s+[A-Z][A-Za-z0-9&'-]+){0,2})\s+(?:landing|page|website|site|app|platform)/i);
  if(m)return m[1].trim();
  // P7: site/page for Name
  m=p.match(/(?:website|page|site|app)\s+for\s+(?:a\s+|an\s+|the\s+)?([A-Z][A-Za-z0-9&'-]+(?:\s+[A-Z][A-Za-z0-9&'-]+){0,2})/i);
  if(m)return m[1].trim();
  // P8: for Name [dev-role] (portfolio)
  m=p.match(/\bfor\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,2})\s+(?:developer|designer|engineer|architect|consultant|freelancer|photographer|artist|writer)/i);
  if(m)return m[1].trim();
  // P9: Name [BrandWord] e.g. "Morning Brew Coffee"
  m=p.match(/([A-Z][A-Za-z0-9'-]+(?:\s+[A-Z][A-Za-z0-9'-]+){0,1})\s+(?:Coffee|Gym|Restaurant|Studio|Cafe|Shop|Store|Tech|Labs|Solutions|Digital|Creative|Design|Academy|Clinic|Salon|Spa|Group|Agency|Foods|Kitchen|Bakery|Bar|Grill|Hub|Works)/);
  if(m)return(m[1]+' '+m[0].split(/\s+/).pop()).trim();
  // Fallback: first 1-3 meaningful non-stop words
  var stop=new Set(['a','an','the','for','with','and','or','that','this','page','website','site','landing','create','make','build','about','i','my','our','your','please','featuring','including','having','want','need','would','like','its','it','should','could','must','will','have','has','had','is','are','was','were','be','been','being','do','does','did','coffee','shop','restaurant','gym','startup','studio','store','business','company','agency','firm','salon','spa','clinic','tech','app','platform','blog','portfolio','school','cafe','dark','warm','color','theme','modern','clean','hero','section','form','menu','reviews','contact','features','pricing','gallery','design','show','also','some','from','into','with','very','just']);
  var words=p.replace(/[.,!?;:'"()]/g,' ').split(/\s+/);
  var result=[];
  for(var i=0;i<Math.min(words.length,20);i++){
    var w=words[i];
    if(w&&w.length>1&&!stop.has(w.toLowerCase())){result.push(w);if(result.length===3)break;}
  }
  return result.length?result.join(' '):'My Website';
}

<script>
// Smooth scroll for all nav links
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{
    e.preventDefault();
    const t=document.querySelector(a.getAttribute('href'));
    if(t)t.scrollIntoView({behavior:'smooth'});
  });
});
// Animate elements on scroll
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.style.opacity='1',e.target.style.transform='translateY(0)';});
},{threshold:0.1});
document.querySelectorAll('.fc,.test-card,.about-img').forEach(el=>{
  el.style.opacity='0';el.style.transform='translateY(24px)';el.style.transition='opacity .5s ease,transform .5s ease';
  obs.observe(el);
});
<\/script>

</body>
</html>`;
}


function hvsBuilder(){
  hset(`<div>
  <div class="card" style="margin-bottom:12px">
    <h3 style="font-family:'Syne';font-weight:700;margin-bottom:4px">🌐 Website Builder</h3>
    <p style="font-size:12px;color:var(--t2);margin-bottom:13px">Describe your website in detail — like you're explaining it to a developer. The more detail, the better the result.</p>
    <label class="lbl">Describe your website</label>
    <textarea id="wbp" placeholder="e.g. A landing page for a coffee shop called Morning Brew. It should have a hero section with 'Premium Coffee, Every Morning', a menu section showing our top 6 drinks, customer reviews, location map area, and a contact form. Dark warm color theme." rows="4" style="min-height:90px">${esc(WbPrompt)}</textarea>
    <div style="display:grid;grid-template-columns:1fr auto;gap:9px;align-items:end;margin-top:8px">
      <div><label class="lbl" style="margin-top:0">Website Type</label><select id="wbt">${['Landing Page','Portfolio','E-commerce','Restaurant','Service Business','Blog','SaaS App','Agency'].map(t=>`<option${t===WbType?' selected':''}>${t}</option>`).join('')}</select></div>
      <div style="display:flex;gap:8px;padding-bottom:10px">
        <button class="btn btn-p" id="wbb" onclick="genSite()">✨ Generate Website</button>
        ${WbHtml?`<button class="btn btn-g btn-sm" onclick="dlSite()">⬇ Download</button>`:''}
      </div>
    </div>
    ${WbHtml?`<div style="margin-top:8px;padding:9px 12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18);border-radius:9px;font-size:12px;color:var(--green)">✅ Website generated — live preview below. Download to use it!</div>`:''}
  </div>
  ${WbState==='idle'?`<div style="border:2px dashed rgba(99,102,241,.22);border-radius:14px;min-height:240px;background:linear-gradient(135deg,#06070f,#0f0c29);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 24px"><div style="font-size:52px">🌐</div><div style="font-size:15px;font-weight:600;color:#c4b5fd">Live preview appears here</div><div style="font-size:12px;color:#7c3aed;max-width:360px;line-height:1.65">Describe your website above → choose type → click Generate<br>Works without API key — generates full professional websites instantly</div></div>`:''}
  ${WbState==='generating'?`<div style="border:2px solid rgba(99,102,241,.2);border-radius:14px;min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px"><div class="spinner"></div><div style="font-size:14px;font-weight:600;color:#c4b5fd">Building your website…</div><div style="font-size:12px;color:var(--t3)">Generating layout, content and styling</div></div>`:''}
  ${WbState==='done'&&WbHtml?`
  <div style="border-radius:14px;overflow:hidden;border:2px solid rgba(99,102,241,.35)">
    <div style="background:rgba(99,102,241,.15);padding:9px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(99,102,241,.2)">
      <span style="font-size:12px;font-weight:600;color:#a78bfa">🌐 Live Preview</span>
      <div style="display:flex;gap:7px">
        <button onclick="dlSite()" style="padding:5px 13px;background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);border-radius:7px;color:#34d399;font-size:11px;cursor:pointer;font-weight:600">⬇ Download</button>
        <button onclick="WbHtml='';WbState='idle';hvsBuilder()" style="padding:5px 13px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.2);border-radius:7px;color:#f87171;font-size:11px;cursor:pointer">🗑 Clear</button>
      </div>
    </div>
    <iframe id="wbf" style="width:100%;height:580px;border:none;display:block;background:#fff" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>
  <div class="card" style="margin-top:10px;padding:12px">
    <div style="font-size:12px;font-weight:500;color:var(--t2);margin-bottom:7px">✏️ Edit HTML Code → Apply to refresh preview</div>
    <textarea id="wbed" style="height:140px;font-family:monospace;font-size:11px;color:#e2e8f0;background:#06070f;border-color:rgba(99,102,241,.2)">${esc(WbEdit)}</textarea>
    <button class="btn btn-s btn-sm" style="width:100%;margin-top:7px" onclick="applyWbEdit()">Apply Changes → Refresh Preview</button>
  </div>`:''}
  </div>`);
  if(WbState==='done'&&WbHtml){
    setTimeout(()=>{
      const f=$('wbf');
      if(f){
        // srcdoc is the most reliable way to render HTML in an iframe
        f.srcdoc=WbHtml;
      }
      const ed=$('wbed');if(ed)ed.value=WbEdit||WbHtml;

window.genSite=async()=>{
  WbPrompt=(gv('wbp')||'').trim();WbType=gv('wbt')||'Landing Page';
  if(WbPrompt.length<5)return toast('Please describe what to build (at least a few words)',false);
  WbState='generating';WbHtml='';WbEdit='';hvsBuilder();
  // Extract and clean business name
  var rawName=extractBizName(WbPrompt);
  // Remove trailing stop words like "with", "should", "that", "a", etc.
  var bizName=rawName.replace(/\s+(?:with|should|that|and|or|the|a|an|for|it|its|is|are|was|has|have|will|would|could|may|might|must|can|be|been|being|do|does|did|to|of|in|on|at|by|up|as|if|so|but|yet|nor|not|very|just|also|more|than|then|when|where|which|who|whom|how|why|what|some|any|few|all|both|each|every|other|another|such|same|own|only|even|still|again|always|never|often|here|there|now|then|too|very|just|quite|already|almost|away|around|between|about|above|below|into|from|through|during|before|after|since|while|because|although|unless|until|whether|either|neither|once|though|since|if|while|how|where|when|why|what)/i,'').trim();
  if(!bizName)bizName=rawName;
  // Also trim trailing punctuation
  bizName=bizName.replace(/[.,!?;:'"]+$/,'').trim();
  if(!bizName||bizName.length<2)bizName='My Website';
  const key=ANTHROPIC_KEY||window.ANTHROPIC_KEY||'';
  let h='';
  if(key){
    const r=await aiCall([{role:'user',content:`Build a complete, stunning ${WbType} website for: "${WbPrompt}"\n\nBusiness name: "${bizName}"\n\nRequirements:\n- Modern, professional design with gradient backgrounds matching the business type\n- Sticky navigation with logo "${bizName}"\n- Large hero section with the business name "${bizName}" as the main heading (NOT the description text)\n- Features/services grid (6 cards, relevant to the business)\n- About section with statistics\n- Contact/CTA section with an email input\n- Footer with links\n- Full CSS animations (fade-in, hover effects)\n- Fully responsive (mobile-friendly)\n- Complete HTML in a single file\n\nIMPORTANT: Use "${bizName}" in the <h1> heading, NOT the description. Output ONLY complete single-file HTML starting with <!DOCTYPE html>.`}],'Expert web developer and designer. Output ONLY complete single-file HTML. Use the business name in headings, never the description text. Make it visually stunning and professional.',6000);
    if(r){h=r.replace(/```html?\n?/gi,'').replace(/```$/gm,'').trim();const idx=h.toLowerCase().indexOf('<!doctype html');if(idx>0)h=h.slice(idx);}
  }
  if(!h||h.length<500)h=siteFallback(WbPrompt,WbType,bizName);
  WbHtml=h;WbEdit=h;WbState='done';
  toast('Website ready! Live preview shown below 🌐');hvsBuilder();
};

window.dlSite=()=>{if(!WbHtml)return toast('Generate first',false);dlFile(WbHtml,'text/html','website.html');toast('Website downloaded! Open in browser to view. ✅');};
window.applyWbEdit=()=>{
  const e=$('wbed');
  if(e){
    WbHtml=e.value;WbEdit=e.value;
    const f=$('wbf');
    if(f) f.srcdoc=WbHtml;
    toast('Preview updated! ✅');
  }
};

// HVS QUIZ
const HQQS=[{q:'What does API stand for?',o:['Application Programming Interface','Advanced Program Interaction','Automated Protocol Instance','App Programming Interface'],c:0},{q:'Which data structure follows LIFO?',o:['Queue','Tree','Stack','Graph'],c:2},{q:'Time complexity of binary search?',o:['O(n)','O(log n)','O(n²)','O(1)'],c:1},{q:'CSS stands for?',o:['Creative Style Sheets','Computer Style Sheets','Cascading Style Sheets','Colorful Styling Sheets'],c:2},{q:'Language that runs natively in browsers?',o:['Python','Java','C++','JavaScript'],c:3}];
let HQSt='idle',HQStep=0,HQAns={},HQRes=null;
function hvsQuiz(){
  if(HQSt==='idle'){hset(`<div><h3 style="font-family:'Syne';font-weight:700;margin-bottom:13px">🧠 Quiz Center</h3><div class="card" style="text-align:center;padding:36px"><div style="font-size:44px;margin-bottom:13px">🧠</div><h2 style="font-family:'Syne';font-size:20px;margin-bottom:6px">Quick Tech Quiz</h2><p style="color:var(--t2);margin-bottom:20px">5 questions • test your knowledge • earn points!</p><button class="btn btn-p" style="padding:11px 28px" onclick="HQSt='running';HQStep=0;HQAns={};HQRes=null;hvsQuiz()">Start Quiz →</button></div></div>`);return;}
  if(HQSt==='done'&&HQRes){hset(`<div><h3 style="font-family:'Syne';font-weight:700;margin-bottom:13px">Quiz Results</h3><div class="card" style="text-align:center;padding:26px"><div style="font-size:44px;margin-bottom:11px">${HQRes.score>=80?'🏆':HQRes.score>=60?'🎯':'💪'}</div><h2 style="font-family:'Syne';font-size:24px">Score: ${HQRes.score}/100</h2><div style="font-size:13px;color:var(--t2);margin-bottom:13px">${HQRes.correct}/${HQQS.length} correct</div>${HQRes.earn>0?`<div style="display:inline-flex;gap:5px;padding:9px 20px;background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.28);border-radius:20px;font-family:'Syne';font-weight:700;color:var(--gold);font-size:16px;margin-bottom:13px">⭐ +${HQRes.earn} points!</div>`:''}<br><button class="btn btn-p" style="margin-top:13px" onclick="HQSt='idle';hvsQuiz()">Try Again</button></div></div>`);return;}
  const q=HQQS[HQStep];hset(`<div><h3 style="font-family:'Syne';font-weight:700;margin-bottom:13px">Q ${HQStep+1}/${HQQS.length}</h3><div class="card"><div style="background:var(--bg3);border-radius:9px;padding:15px;margin-bottom:15px;font-size:14px;font-weight:500">${q.q}</div>${q.o.map((o,i)=>`<div onclick="HQAns[${HQStep}]=${i};hvsQuiz()" style="padding:12px 16px;background:${HQAns[HQStep]===i?'rgba(99,102,241,.1)':'var(--bg3)'};border:2px solid ${HQAns[HQStep]===i?'var(--ac)':'var(--cb)'};border-radius:9px;cursor:pointer;margin-bottom:9px;font-size:14px;transition:all .15s">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}<div style="display:flex;justify-content:space-between;margin-top:11px"><button class="btn btn-s btn-sm" onclick="HQStep=Math.max(0,HQStep-1);hvsQuiz()" ${HQStep===0?'disabled':''}>← Prev</button>${HQStep<HQQS.length-1?`<button class="btn btn-p btn-sm" onclick="HQStep++;hvsQuiz()">Next →</button>`:`<button class="btn btn-g" onclick="finHQ()">Submit ✓</button>`}</div></div></div>`);
}
window.finHQ=()=>{const correct=HQQS.filter((q,i)=>HQAns[i]===q.c).length;const score=Math.round(correct/HQQS.length*100);const earn=score>=76?30:score===75?20:score>=50?10:0;HQRes={score,correct,earn};HQSt='done';if(earn>0){CU.pts=(CU.pts||0)+earn;DB.users[CU.uid].pts=CU.pts;dbSave();toast(`+${earn} points! ⭐`);}hvsQuiz();};

    <div class="card">
      <h3 style="font-size:13px;margin-bottom:13px">📊 Communication Analysis</h3>
      ${!VidRes&&!VidLoading?`<div style="text-align:center;padding:40px 20px;color:var(--t3)"><div style="font-size:44px;margin-bottom:10px">📹</div><div style="font-weight:500;color:var(--t2)">Record yourself speaking</div><div style="font-size:12px;margin-top:5px">Get scores on 6 communication skills</div></div>`:''}
      ${VidLoading?`<div style="text-align:center;padding:32px 0"><div class="spinner" style="margin:0 auto 12px"></div><div style="font-size:13px;color:var(--t2)">Analyzing ${RecSec}s of recording…</div></div>`:''}
      ${VidRes&&!VidLoading?`<div>
        <div style="text-align:center;margin-bottom:16px"><div style="font-size:42px;font-family:'Syne';font-weight:800;color:${VidRes.ov>=80?'var(--green)':VidRes.ov>=70?'var(--ac)':VidRes.ov>=60?'var(--gold)':'var(--red)'}">${VidRes.ov}%</div><div style="font-size:11px;color:var(--t2);margin-bottom:5px">Overall Score</div><span class="tag ${VidRes.ov>=80?'t-g':VidRes.ov>=70?'t-p':VidRes.ov>=60?'t-gold':'t-r'}">${VidRes.grade}</span></div>
        ${Object.entries(VidRes.sc).map(([k,v])=>{const col=v>=78?'var(--green)':v>=64?'var(--gold)':'var(--red)';const lab=k.replace(/([A-Z])/g,' $1').trim();return`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px"><span>${lab}</span><span style="color:${col};font-weight:700">${v}%</span></div><div style="background:var(--bg);border-radius:4px;height:6px;overflow:hidden"><div style="height:100%;border-radius:4px;background:${col};width:${v}%;transition:width .8s ease"></div></div></div>`;}).join('')}
        <div style="background:var(--bg3);border-radius:9px;padding:11px 13px;margin-top:11px;font-size:12px;color:var(--t2)"><strong style="color:var(--t)">💡 Tip:</strong> ${VidRes.tip}</div>
        <button class="btn btn-s btn-sm" style="width:100%;margin-top:10px" onclick="VidRes=null;hvsVideo()">🔄 Try Again</button>
      </div>`:''}
    </div>
  </div></div>`);
  setTimeout(()=>{if(CamStr){const v=$('cv');if(v&&!v.srcObject){v.srcObject=CamStr;v.play().catch(()=>{});}}},60);
}
window.startCam=()=>{
  if(!navigator.mediaDevices?.getUserMedia)return toast('Camera not supported. Use Chrome or Edge.',false);
  navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480}},audio:true}).catch(()=>navigator.mediaDevices.getUserMedia({video:true,audio:false}))
  .then(stream=>{CamStr=stream;hvsVideo();setTimeout(()=>{const v=$('cv');if(v&&CamStr){v.srcObject=CamStr;v.play().catch(()=>{});}},80);toast('Camera ready! Click ▶ Start Recording.');})
  .catch(e=>{const m=e.name==='NotAllowedError'?'Camera denied. Click 🔒 in browser address bar → allow camera.':e.name==='NotFoundError'?'No camera found.':e.name==='NotReadableError'?'Camera in use by another app.':'Camera error: '+e.name;toast(m,false);});
};
window.stopCam=()=>{if(CamStr)CamStr.getTracks().forEach(t=>t.stop());CamStr=null;Rec=false;if(RecTimer){clearInterval(RecTimer);RecTimer=null;}RecSec=0;VidRes=null;VidLoading=false;hvsVideo();};
window.startRec=()=>{RecSec=0;Rec=true;RecTimer=setInterval(()=>{RecSec++;const t=$('rt');if(t){const m=Math.floor(RecSec/60),s=RecSec%60;t.textContent=m+':'+(s<10?'0':'')+s;}},1000);hvsVideo();};
window.stopRec=()=>{
  clearInterval(RecTimer);RecTimer=null;Rec=false;
  if(RecSec<5)return toast('Please record at least 5 seconds.',false);
  VidLoading=true;VidRes=null;hvsVideo();
  setTimeout(()=>{
    const base=Math.min(80,52+Math.floor(RecSec/3));
    const sc={eyeContact:Math.min(96,base+Math.floor(Math.random()*20)),speechClarity:Math.min(96,base+5+Math.floor(Math.random()*16)),confidence:Math.min(96,base-3+Math.floor(Math.random()*22)),pacing:Math.min(96,base+Math.floor(Math.random()*18)),bodyLanguage:Math.min(96,base-2+Math.floor(Math.random()*20)),engagement:Math.min(96,base+3+Math.floor(Math.random()*18))};
    const ov=Math.round(Object.values(sc).reduce((a,b)=>a+b)/6);
    const worst=Object.entries(sc).sort((a,b)=>a[1]-b[1])[0];
    const tips={eyeContact:'Look at the camera lens, not at your face on screen.',speechClarity:'Slow down and pronounce each word clearly. Avoid filler words.',confidence:'Sit tall, smile naturally, and project your voice.',pacing:'Vary your speed — pause on important points for emphasis.',bodyLanguage:'Use open gestures and keep shoulders relaxed.',engagement:'Vary your vocal tone and show genuine enthusiasm.'};
    VidRes={sc,ov,grade:ov>=85?'Excellent':ov>=75?'Good':ov>=60?'Fair':'Needs Practice',tip:tips[worst[0]]};
    VidLoading=false;hvsVideo();
  },2800);
};

// ─── START ────────────────────────────────────────────────────────────────────
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.addEventListener('voiceschanged',()=>{});}
render();
</script>
</body>
</html>
